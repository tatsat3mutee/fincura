services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: fincura-api
    runtime: python
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --max-requests 1000 --max-requests-jitter 100 --timeout 30 --graceful-timeout 10
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false   # Paste your Neon connection string in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://fincura.onrender.com,https://fincura.tatsatpandey.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://fincura-api.onrender.com/api/auth/google/callback
      - key: FRONTEND_URL
        value: https://fincura.onrender.com
      - key: SENTRY_DSN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@fincura.app

  # ── Frontend (keep as Render static until Vercel migration) ───────────────
  - type: web
    name: fincura
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://fincura-api.onrender.com
      - key: VITE_SENTRY_DSN
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
